<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f0e0c">
  <title>Rompecoco — Puzzle</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="ui/styles.css">
</head>
<body data-view="home">
  <header class="app-header" aria-hidden="true">
    <h1 class="app-title">Rompecoco</h1>
    <p class="app-tagline">Une las piezas</p>
  </header>

  <!-- Pantalla principal: modos de juego -->
  <section id="home" class="view-section home-view" data-view-section="home">
    <div class="mode-cards">
      <button type="button" id="mode-daily" class="mode-card mode-card--daily" aria-label="Desafío del día">
        <span class="mode-card__icon" aria-hidden="true">◇</span>
        <span class="mode-card__title">Desafío del día</span>
        <span class="mode-card__desc">Un puzzle nuevo cada día para todos</span>
      </button>
      <button type="button" id="mode-clasico" class="mode-card mode-card--clasico" aria-label="Modo clásico 50 niveles">
        <span class="mode-card__icon" aria-hidden="true">▣</span>
        <span class="mode-card__title">Clásico</span>
        <span class="mode-card__desc">50 niveles para completar</span>
      </button>
      <button type="button" id="mode-infinito" class="mode-card mode-card--infinito" aria-label="Modo infinito">
        <span class="mode-card__icon" aria-hidden="true">∞</span>
        <span class="mode-card__title">Infinito</span>
        <span class="mode-card__desc">Puzzles sin fin</span>
      </button>
    </div>
  </section>

  <!-- Lista de niveles (modo clásico) -->
  <section id="levels-view" class="view-section levels-view" data-view-section="levels">
    <button type="button" id="back-home-btn" class="nav-btn">← Inicio</button>
    <h2 class="section-title">Elige nivel</h2>
    <div id="level-grid" class="level-grid"></div>
  </section>

  <!-- Área de juego -->
  <section id="game-area" class="view-section game-view" data-view-section="game">
    <button type="button" id="back-levels-btn" class="nav-btn nav-btn--game">← Niveles</button>
    <div id="board-container">
      <div id="board-wrap">
        <canvas id="grid-overlay"></canvas>
        <div id="hover-overlay"></div>
      </div>
    </div>
    <div id="status" class="game-status"></div>
    <button id="shuffle-btn" class="shuffle-btn">Mezclar</button>
  </section>

  <canvas id="ghost" aria-hidden="true"></canvas>

  <div id="win-overlay" class="win-overlay" role="dialog" aria-labelledby="win-title" aria-modal="true">
    <h2 id="win-title" class="win-overlay__title">Completado</h2>
    <div id="win-stats" class="win-overlay__stats"></div>
    <div class="win-overlay__actions">
      <button type="button" id="next-level-btn" class="win-cta">Siguiente nivel</button>
      <button type="button" id="replay-btn" class="win-cta">Repetir</button>
      <button type="button" id="win-levels-btn" class="win-cta">Niveles</button>
      <button type="button" id="download-btn" class="win-cta">Descargar</button>
    </div>
  </div>

  <div id="transition-overlay" class="transition-overlay" aria-hidden="true"></div>
  <script type="module" src="main.js"></script>
</body>
</html>
