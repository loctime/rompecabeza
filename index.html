<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f0e0c">
  <title>Puzzle</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="ui/styles.css">
</head>
<body>
  <h1>Puzzle</h1>
  <p id="subtitle">arrastra · intercambia · fusiona</p>

  <div id="level-grid" class="level-grid"></div>

  <div id="game-area" class="game-area hidden">
    <button id="back-levels-btn" class="back-btn">← Niveles</button>
    <div id="board-container">
      <div id="board-wrap">
        <canvas id="grid-overlay"></canvas>
        <div id="hover-overlay"></div>
      </div>
    </div>
    <div id="status"></div>
    <button id="shuffle-btn">mezclar</button>
  </div>

  <canvas id="ghost"></canvas>

  <div id="win-overlay">
    <h2>¡Completado!</h2>
    <div class="win-actions">
      <button id="replay-btn">Jugar de nuevo</button>
      <button id="win-levels-btn">Niveles</button>
    </div>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
